<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MobCash Admin — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #090c10;
    --surface: #0f1318;
    --border: #1e2530;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e8e8;
    --muted: #5a6475;
    --error: #e05252;
  }

  body {
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,168,76,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  @keyframes gridShift { to { background-position: 60px 60px; } }

  .card {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 48px;
    width: 420px;
    box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.05);
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(201,168,76,0.3);
  }
  .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--gold); }

  h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 36px; font-family: 'DM Mono', monospace; }

  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    margin-top: 8px;
    padding: 15px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #090c10;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    letter-spacing: 0.02em;
  }
  .btn:hover { opacity: 0.92; box-shadow: 0 6px 28px rgba(201,168,76,0.45); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: rgba(224,82,82,0.1);
    border: 1px solid rgba(224,82,82,0.3);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--error);
    margin-top: 14px;
    display: none;
  }
  .error-msg.show { display: block; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💳</div>
    <div class="logo-text">Mob<span>Cash</span></div>
  </div>

  <h1>Admin Panel</h1>
  <p class="subtitle">// agent management system</p>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
  <div class="error-msg" id="errMsg">Invalid username or password.</div>

  <div class="divider"></div>
  <p class="footer-note">MobCash Agent Portal v1.0</p>
</div>

<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/dashboard';
      } else {
        err.textContent = data.message || 'Invalid credentials.';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    } catch {
      err.textContent = 'Server error. Please try again.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    }
  }
</script>
</body>
</html>
